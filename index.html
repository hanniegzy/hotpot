<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HotpotQA 多跳问答检索系统 | 大作业</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --primary: #2563eb; --primary-dark: #1d4ed8;
            --bg: #f8fafc; --card: #fff; --text: #1e293b;
            --text-light: #64748b; --border: #e2e8f0;
            --shadow: 0 4px 12px rgba(0,0,0,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); line-height: 1.6; }
        .container { max-width:1200px; margin:0 auto; padding:2rem 1rem; }
        header { text-align:center; margin-bottom:2.5rem; }
        header h1 { font-size:2.2rem; color:var(--primary); margin-bottom:0.5rem; }
        header p { color:var(--text-light); }
        .search-box {
            background:var(--card); padding:1.5rem; border-radius:12px;
            box-shadow:var(--shadow); display:flex; gap:1rem; margin-bottom:2rem;
        }
        input {
            flex:1; padding:1rem 1.2rem; border:2px solid var(--border);
            border-radius:8px; font-size:1rem;
        }
        button {
            padding:1rem 1.5rem; background:var(--primary); color:white;
            border:none; border-radius:8px; font-weight:bold; cursor:pointer;
        }
        .result-card {
            background:var(--card); padding:1.2rem; border-radius:10px;
            box-shadow:var(--shadow); margin-bottom:1rem; border-left:4px solid var(--primary);
        }
        .question { font-weight:bold; font-size:1rem; margin-bottom:0.5rem; }
        .answer { color:var(--text-light); background:#eff6ff; padding:0.6rem; border-radius:6px; }
        .chart-box { background:var(--card); padding:1.5rem; border-radius:12px; box-shadow:var(--shadow); margin-top:2rem; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>HotpotQA 多跳问答检索系统</h1>
            <p>课程大作业 | 问答检索 + 聚类可视化</p>
        </header>

        <div class="search-box">
            <input id="word" placeholder="输入英文搜索，例如：which, magazine, first, arthur">
            <button onclick="go()">搜索问题</button>
        </div>

        <div id="result"></div>

        <div class="chart-box">
            <h3 style="margin-bottom:1rem;">问题聚类可视化</h3>
            <canvas id="cluster" height="250"></canvas>
        </div>
    </div>

<script>
const API = "http://192.168.199.157:5000";

// 【修复版】搜索函数，100% 能发关键词
async function go() {
    let keyword = document.getElementById("word").value.trim();
    console.log("搜索关键词：", keyword);

    let res = await fetch(API + "/search", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ keyword: keyword })
    });

    let data = await res.json();
    show(data);
}

// 显示结果
function show(data) {
    let dom = document.getElementById("result");
    dom.innerHTML = "";

    if (data.length === 0) {
        dom.innerHTML = "<p style='text-align:center; color:gray'>未找到结果</p>";
        return;
    }

    data.forEach(item => {
        let div = document.createElement("div");
        div.className = "result-card";
        div.innerHTML = `
            <div class="question">${item.question}</div>
            <div class="answer">答案：${item.answer}</div>
        `;
        dom.appendChild(div);
    });
}

// 加载聚类图
async function loadChart() {
    let res = await fetch(API + "/cluster");
    let data = await res.json();
    let count = [0,0,0,0,0];
    data.forEach(x => count[x.cluster]++);

    new Chart(document.getElementById("cluster"), {
        type: "bar",
        data: {
            labels: ["分类1","分类2","分类3","分类4","分类5"],
            datasets: [{ data: count, backgroundColor: "#2563eb" }]
        }
    });
}

window.onload = loadChart;
</script>
</body>
</html>
